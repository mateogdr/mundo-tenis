{% extends 'layout.html' %}
{% block content %}

<link rel="stylesheet" href="/stylesheets/mundo_tenis.css">

<h2 id="jugadores">Editar jugador: {{ jugador.nombre }}</h2>

<form action="{{ url_for('jugadores.update', id=jugador.id) }}" method="post" enctype="multipart/form-data">
    
    <input type="hidden" name="_method" value="PUT">

    <label for="nombre">Nombre completo:</label>
    <input type="text" id="nombre" name="nombre" value="{{ jugador.nombre }}" required/>
    
    <label for="nacionalidad">Nacionalidad:</label>
    <input type="text" id="nacionalidad" name="nacionalidad" value="{{ jugador.nacionalidad }}" required/>
    
    <label for="edad">Edad:</label>
    <input type="number" id="edad" name="edad" value="{{ jugador.edad }}" required/>
    
    <label for="puntos">Puntos:</label>
    <input type="number" id="puntos" name="puntos" value="{{ jugador.puntos }}" required/>

    <label for="activo">Activo:</label>
    <select id="activo" name="activo">
        <option value="True" {% if jugador.activo %}selected{% endif %}>Si</option>
        <option value="False" {% if not jugador.activo %}selected{% endif %}>No</option>
    </select>

    <label for="descripcion">Descripción:</label>
    <input type="text" id="descripcion" name="descripcion" value="{{ jugador.descripcion }}" required/>
    
    {% if jugador.imagen %}
    <div>
        <p>Imagen actual:</p>
        <img src="{{ url_for('download', filename=jugador.imagen) }}" 
            alt="Foto de {{ jugador.nombre }}" 
            style="max-width:200px; max-height:200px;">
    </div>
    <label for="file">Cambiar foto del jugador (Máx 5MB):</label>
    <input type="file" id="file" name="file" accept="image/*">
    {% else %}
    <label for="file">Subir foto del jugador (Máx 5MB):</label>
    <input type="file" id="file" name="file" accept="image/*">
    {% endif %}

    <input type="submit" value="Guardar cambios">
</form>

{% endblock %}
